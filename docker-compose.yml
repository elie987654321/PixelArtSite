services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pixelart-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - pixelart-sqldata:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pixelart-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=mssql,1433;Database=PixelArt;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
    ports:
      - "5126:8080"
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pixelart-frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pixelart-sqldata:
