server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular is a single-page app: any unknown path should return index.html
    # so the client-side router can handle it (instead of nginx 404ing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
