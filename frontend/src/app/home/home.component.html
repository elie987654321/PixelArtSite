<div class="page">

    <p class="eyebrow">PixelArt</p>
    <h1 class="title">Every pixel<br />on purpose.</h1>

  <main class="choices">

      <span class="choice-label">View the gallery</span>
      <span class="choice-desc">Browse the pixel drawings that already exist.</span>

    </a>

</div>
