<div class="page">
  <header class="masthead">
    <p class="eyebrow">PixelArt · gallery</p>
    <h1 class="title">Gallery</h1>
  </header>

  <main>
    @if (loading) {
      <p class="status">Loading drawings…</p>
    } @else if (error) {
      <p class="status status--error">{{ error }}</p>
    } @else if (drawings.length === 0) {
      <div class="empty">
        <p class="status">No drawings yet.</p>
        <p class="hint">Create one with <code>POST /api/drawings</code> and it appears here.</p>
      </div>
    } @else {
      <section class="gallery">
        @for (drawing of drawings; track drawing.id) {
          <app-drawing-view [drawing]="drawing" />
        }
      </section>
    }
  </main>
</div>
